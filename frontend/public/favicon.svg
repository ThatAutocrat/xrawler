<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Background -->
  <rect width="64" height="64" rx="12" fill="#0a0a0f"/>
  <!-- Spider body -->
  <ellipse cx="32" cy="36" rx="8" ry="10" fill="#8b0000"/>
  <ellipse cx="32" cy="26" rx="6" ry="6" fill="#8b0000"/>
  <!-- Eyes -->
  <circle cx="29" cy="24" r="1.5" fill="#ff4444"/>
  <circle cx="35" cy="24" r="1.5" fill="#ff4444"/>
  <!-- Legs left -->
  <line x1="24" y1="30" x2="10" y2="22" stroke="#cc2222" stroke-width="2" stroke-linecap="round"/>
  <line x1="24" y1="34" x2="9" y2="32" stroke="#cc2222" stroke-width="2" stroke-linecap="round"/>
  <line x1="24" y1="38" x2="10" y2="44" stroke="#cc2222" stroke-width="2" stroke-linecap="round"/>
  <line x1="25" y1="42" x2="13" y2="52" stroke="#cc2222" stroke-width="2" stroke-linecap="round"/>
  <!-- Legs right -->
  <line x1="40" y1="30" x2="54" y2="22" stroke="#cc2222" stroke-width="2" stroke-linecap="round"/>
  <line x1="40" y1="34" x2="55" y2="32" stroke="#cc2222" stroke-width="2" stroke-linecap="round"/>
  <line x1="40" y1="38" x2="54" y2="44" stroke="#cc2222" stroke-width="2" stroke-linecap="round"/>
  <line x1="39" y1="42" x2="51" y2="52" stroke="#cc2222" stroke-width="2" stroke-linecap="round"/>
  <!-- Web thread -->
  <line x1="32" y1="16" x2="32" y2="4" stroke="#666" stroke-width="1.5" stroke-linecap="round" stroke-dasharray="2,2"/>
</svg>
